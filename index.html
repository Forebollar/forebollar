<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forebollar</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="grund.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>

      .cart-sidebar {
        position: fixed;
        top: 0;
        right: -400px;
        width: 400px;
        height: 100%;
        background: #f8f9fa;
        box-shadow: -2px 0 5px rgba(0, 0, 0, 0.5);
        overflow-y: auto;
        transition: right 0.3s ease;
        z-index: 1050;
        padding: 20px;
      }
      .cart-sidebar.show {
        right: 0;
      }
      .cart-button {
        background-color: #28a745;
        color: white;
        border: none;
      }
      .cart-button:hover {
        background-color: #218838;
      }
      .remove-button {
        background-color: #dc3545;
        color: white;
        border: none;
      }
      .remove-button:hover {
        background-color: #c82333;
      }
      .cart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .cart-title {
        margin: 0;
      }
      .close-cart {
        font-size: 1.5rem;
        cursor: pointer;
      }
      .highlight-card {
        background-color: #ffeb3b;
        padding: 10px;
        margin-bottom: 20px;
        border-radius: 10px;
      }
      .highlight-card .card-body {
        padding: 10px;
      }
      .highlight-card .card-title {
        font-size: 1.25rem;
      }
      .highlight-card .card-text {
        font-size: 0.875rem;
      }
      .highlight-card .card-img-top {
        height: 150px;
        object-fit: cover;
      }

      .badge {
        font-size: 0.9rem;
        padding: 0.5em 1em;
        border-radius: 0.25rem;
      }

      .badge-success {
        background-color: #28a745;
      }

      .badge-danger {
        background-color: #dc3545;
      }

      .old-price {
        text-decoration: line-through;
        color: red;
        margin-right: 10px;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and Babel Scripts -->
    <script src="https://unpkg.com/react/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-bootstrap/1.6.4/react-bootstrap.min.js" crossorigin></script>

    <!-- Your React Code -->
    <script type="text/babel">
      const { Container, Navbar, Nav, Jumbotron, Button, Row, Col, Card, Form, Carousel, Modal } = ReactBootstrap;

      const products = [
          { id: 1, name: 'Pro V1 12 st', description: 'Världens mest spelade golfboll, nu till 1/5 av butiks värdet! Välj mellan A, B och C klass.', price: 109, selectable: true, image: 'Pro-V1.jpg', recommended: true },
          { id: 2, name: 'Taylormade MIX 12 st', description: 'Blandade golfbollar från Taylormade', price: 89, selectable: false, image: 'taylormade.jpg', },
          { id: 3, name: 'Callaway MIX 12 st', description: 'Blandade golfbollar från Callaway', price: 89, selectable: false, image: 'callaway.jpg' },
          { id: 4, name: 'Tour MIX 12 st', description: 'Tour Golfbollar till bra pris, från: Taylormade, Callaway, Bridgestone, Srixon m.m.', oldPrice: 119, price: 99, selectable: false, image: 'tour-mix.jpg', deal: true },
          { id: 5, name: 'Floridabollar MIX 20 st', description: 'Golfbollar till lägsta möjliga pris, från: Vice, Bridgestone, Wilson, Pinacle, m.m.', price: 69, selectable: false, image: 'florida-mix.jpg' },
          { id: 6, name: 'Färg MIX 6 st', description: 'Blandade färgade golfbollar från märken som Titleist, Callaway, m.m.', price: 49, selectable: false, image: 'färg-mix.jpg', },
        ];


      const App = () => {
        const [cart, setCart] = React.useState([]);
        const [showCart, setShowCart] = React.useState(false);

        const addToCart = (product, selectedClass = 'C') => {
          const existingProduct = cart.find(item => item.id === product.id && item.selectedClass === selectedClass);
          if (existingProduct) {
            setCart(cart.map(item =>
              item.id === product.id && item.selectedClass === selectedClass
                ? { ...item, quantity: item.quantity + 1 }
                : item
            ));
          } else {
            setCart([...cart, { ...product, quantity: 1, selectedClass }]);
          }
        };

        const removeFromCart = (index) => {
          const newCart = [...cart];
          newCart.splice(index, 1);
          setCart(newCart);
        };

        const sendEmail = () => {
          const email = "forebollar@gmail.com";
          const subject = "Beställning av golfbollar";
          const body = cart.map(item => `${item.name} - Klass: ${item.selectedClass} - Antal: ${item.quantity} - Pris: ${item.price} SEK`).join("\n");
          window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        };

        return (
          <>
            <Navbar bg="dark" variant="dark" expand="lg" sticky="top">
              <Navbar.Brand href="#home">Forebollar</Navbar.Brand>
              <Nav className="ml-auto">
                <Nav.Link className="cart-button" onClick={() => setShowCart(!showCart)}>
                  <i className="fas fa-shopping-cart"></i> Varukorg ({cart.length})
                </Nav.Link>
              </Nav>
            </Navbar>

            <div className={`cart-sidebar ${showCart ? 'show' : ''}`}>
              <div className="cart-header">
                <h4 className="cart-title"><i className="fas fa-shopping-cart"></i> Varukorg</h4>
                <span className="close-cart" onClick={() => setShowCart(false)}>&times;</span>
              </div>
              <ul className="list-group">
                {cart.map((item, index) => (
                  <li key={index} className="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                      {item.name} - Klass: {item.selectedClass} - Antal: {item.quantity}
                    </div>
                    <Button variant="danger" size="sm" className="remove-button" onClick={() => removeFromCart(index)}>
                      <i className="fas fa-trash-alt"></i>
                    </Button>
                  </li>
                ))}
              </ul>
              <Button className="mt-3 cart-button" onClick={sendEmail} disabled={cart.length === 0}>
                <i className="fas fa-paper-plane"></i> Skicka
              </Button>
            </div>

            <Jumbotron className="bg-image text-center">
              <h1 className="display-4 jumbo-text">Forebollar</h1>
              <p className="lead jumbo-text">Fore your wallet!</p>
            </Jumbotron>

            <Container id="products" className="my-5">
              <h2 className="text-center">Våra Produkter</h2>
              <Row>
                {products.map(product => (
                  <Col md={4} key={product.id} className="my-3">
                    <ProductCard product={product} addToCart={addToCart} />
                  </Col>
                ))}
              </Row>
            </Container>
          </>
        );
      };

      const ProductCard = ({ product, addToCart }) => {
        const [price, setPrice] = React.useState(product.price);
        const [selectedClass, setSelectedClass] = React.useState('C');

        const handleSelectChange = (e) => {
          const selectedClass = e.target.value;
          setSelectedClass(selectedClass);
          let newPrice = product.price;
          if (selectedClass === 'B') {
            newPrice += 20;
          } else if (selectedClass === 'A') {
            newPrice += 40;
          }
          setPrice(newPrice);
        };

        return (
          <Card className="product-card shadow-sm h-100">
            {product.images ? (
              <Carousel>
                {product.images.map((image, index) => (
                  <Carousel.Item key={index}>
                    <img className="d-block w-100" src={image} alt={`Slide ${index}`} />
                  </Carousel.Item>
                ))}
              </Carousel>
            ) : (
              <Card.Img variant="top" src={product.image} alt={product.name} className="product-image" />
            )}
            <Card.Body>
              {product.recommended && (
                <div className="badge badge-success mb-2">REKOMMENDERAD BOLL</div>
              )}
              {product.deal && (
                <div className="badge badge-danger mb-2">VECKANS DEAL</div>
              )}
              <Card.Title>{product.name}</Card.Title>
              <Card.Text>{product.description}</Card.Text>
              {product.oldPrice && (
                <div>
                  <span className="old-price">{product.oldPrice} SEK</span>
                  <span className="new-price">{price} SEK</span>
                </div>
              )}
              {!product.oldPrice && (
                <h4>Pris: {price} SEK</h4>
              )}
              {product.selectable && (
                <Form.Group controlId="productSelect">
                  <Form.Label>Välj klass</Form.Label>
                  <Form.Control as="select" defaultValue="C" onChange={handleSelectChange}>
                    <option value="C">C</option>
                    <option value="B">B</option>
                    <option value="A">A</option>
                  </Form.Control>
                </Form.Group>
              )}
              <Button variant="primary" className="cart-button" onClick={() => addToCart(product, selectedClass)}>
                <i className="fas fa-cart-plus"></i> Lägg till i varukorgen
              </Button>
            </Card.Body>
          </Card>
        );
      };

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
